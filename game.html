<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon Says game</title>
    <link rel="stylesheet" href="game.css" />
  </head>
  <body>
    <h1>Simon Says Games</h1>
    <h3>press any key to start game</h3>
    <div class="one box">
      <div class="btn" type="button" style="background-color: red">1</div>
      <div class="btn" type="button" style="background-color: yellow">2</div>
    </div>
    <div class="two box">
      <div class="btn" type="button" style="background-color: green">3</div>
      <div class="btn" type="button" style="background-color: purple">4</div>
    </div>
    <script src="GameApp.js"></script>
  </body>
</html>
